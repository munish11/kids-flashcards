<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Ears -->
  <ellipse cx="80" cy="40" rx="14" ry="40" fill="#ECE0D1"/>
  <ellipse cx="120" cy="40" rx="14" ry="40" fill="#ECE0D1"/>
  <ellipse cx="80" cy="40" rx="8" ry="30" fill="#FFB6C1"/>
  <ellipse cx="120" cy="40" rx="8" ry="30" fill="#FFB6C1"/>
  <!-- Body -->
  <ellipse cx="100" cy="145" rx="40" ry="35" fill="#ECE0D1"/>
