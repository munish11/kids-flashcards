  <circle cx="100" cy="95" r="35" fill="#ECE0D1"/>
  <!-- Eyes -->
  <circle cx="87" cy="88" r="6" fill="white"/>
  <circle cx="113" cy="88" r="6" fill="white"/>
  <circle cx="88" cy="89" r="4" fill="#E74C3C"/>
  <circle cx="114" cy="89" r="4" fill="#E74C3C"/>
