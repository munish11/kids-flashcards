  <line x1="65" y1="98" x2="90" y2="100" stroke="#BDC3C7" stroke-width="1"/>
  <line x1="65" y1="104" x2="90" y2="103" stroke="#BDC3C7" stroke-width="1"/>
  <line x1="110" y1="100" x2="135" y2="98" stroke="#BDC3C7" stroke-width="1"/>
  <line x1="110" y1="103" x2="135" y2="104" stroke="#BDC3C7" stroke-width="1"/>
  <!-- Feet -->
  <ellipse cx="80" cy="172" rx="15" ry="8" fill="#ECE0D1"/>
  <ellipse cx="120" cy="172" rx="15" ry="8" fill="#ECE0D1"/>
