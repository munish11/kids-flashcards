<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Body -->
  <ellipse cx="100" cy="135" rx="45" ry="35" fill="#F5A623"/>
  <!-- Head -->
  <circle cx="100" cy="85" r="38" fill="#F5A623"/>
  <!-- Ears (triangles) -->
  <polygon points="68,60 58,25 82,50" fill="#F5A623"/>
  <polygon points="132,60 142,25 118,50" fill="#F5A623"/>
  <polygon points="70,55 63,32 80,50" fill="#FFD1DC"/>
  <polygon points="130,55 137,32 120,50" fill="#FFD1DC"/>
  <!-- Eyes -->
  <ellipse cx="83" cy="80" rx="8" ry="9" fill="#2ECC71"/>
  <ellipse cx="117" cy="80" rx="8" ry="9" fill="#2ECC71"/>
  <ellipse cx="83" cy="80" rx="3" ry="8" fill="#2C3E50"/>
  <ellipse cx="117" cy="80" rx="3" ry="8" fill="#2C3E50"/>
  <!-- Nose -->
  <polygon points="100,92 96,88 104,88" fill="#FFB6C1"/>
  <!-- Whiskers -->
  <line x1="60" y1="90" x2="88" y2="93" stroke="#2C3E50" stroke-width="1.5"/>
  <line x1="60" y1="96" x2="88" y2="96" stroke="#2C3E50" stroke-width="1.5"/>
  <line x1="112" y1="93" x2="140" y2="90" stroke="#2C3E50" stroke-width="1.5"/>
  <line x1="112" y1="96" x2="140" y2="96" stroke="#2C3E50" stroke-width="1.5"/>
  <!-- Mouth -->
  <path d="M 96 95 Q 100 100, 104 95" stroke="#2C3E50" stroke-width="1.5" fill="none"/>
  <!-- Tail -->
  <path d="M 145 135 Q 170 110, 160 85" stroke="#F5A623" stroke-width="8" fill="none" stroke-linecap="round"/>
</svg>