<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Pea pod -->
  <path d="M 30 110 Q 100 40, 170 110 Q 100 140, 30 110 Z" fill="#27AE60"/>
  <!-- Pod opening -->
  <path d="M 40 110 Q 100 55, 160 110" stroke="#1E8449" stroke-width="2" fill="none"/>
  <!-- Peas inside -->
  <circle cx="70" cy="100" r="18" fill="#2ECC71"/>
  <circle cx="100" cy="95" r="18" fill="#2ECC71"/>
  <circle cx="130" cy="100" r="18" fill="#2ECC71"/>
  <!-- Pea shine -->
  <circle cx="65" cy="93" r="5" fill="white" opacity="0.2"/>
  <circle cx="95" cy="88" r="5" fill="white" opacity="0.2"/>
  <circle cx="125" cy="93" r="5" fill="white" opacity="0.2"/>
  <!-- Stem -->
  <path d="M 30 110 Q 20 105, 25 95" stroke="#1E8449" stroke-width="3" fill="none"/>
</svg>